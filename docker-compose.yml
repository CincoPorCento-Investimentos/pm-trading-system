services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: hft-postgres
    environment:
      POSTGRES_DB: hft_trading
      POSTGRES_USER: hft_user
      POSTGRES_PASSWORD: hft_password
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hft_user -d hft_trading"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hft-network
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 1G

  # Redis for caching and pub/sub
  redis:
    image: redis:7-alpine
    container_name: hft-redis
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - hft-network
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M

  # HFT Trading Platform - Main Application
  hft-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hft-app
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: hft_trading
      DB_USERNAME: hft_user
      DB_PASSWORD: hft_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      NODE_ID: 1
      AERON_DIR: /dev/shm/aeron-hft
      MARKET_DATA_EXCHANGE: BINANCE
      MARKET_DATA_SYMBOLS: BTCUSDT,ETHUSDT,BNBUSDT,SOLUSDT,XRPUSDT
      MARKET_DATA_TCP_PORT: 9500
      RISK_MAX_ORDER_SIZE: 1000
      RISK_MAX_POSITION_SIZE: 10000
      FIX_ENABLED: "false"
      JAVA_OPTS: >-
        -server
        -XX:+UseG1GC
        -XX:MaxGCPauseMillis=10
        -XX:+UseStringDeduplication
        -XX:+AlwaysPreTouch
        -XX:+DisableExplicitGC
        -Xms2g
        -Xmx4g
    volumes:
      - ./data:/data
      - ./logs:/logs
      - /dev/shm:/dev/shm
    ports:
      - "8080:8080"
      - "9500:9500"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - hft-network
    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 4G
    # For low-latency performance
    privileged: true
    cap_add:
      - SYS_NICE
      - IPC_LOCK
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536

  # Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: hft-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    networks:
      - hft-network
    depends_on:
      - hft-app

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: hft-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin123
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    ports:
      - "3001:3000"
    networks:
      - hft-network
    depends_on:
      - prometheus

networks:
  hft-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
